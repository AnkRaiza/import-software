<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Import Software</title>
  <style>
    :root { color-scheme: light dark; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
    }
    .card {
      text-align: center;
      padding: 2.5rem 3rem;
      border: 1px solid #1e293b;
      border-radius: 16px;
      background: #111827;
      box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    }
    h1 { margin: 0 0 .5rem; font-size: 2rem; }
    p { margin: 0; color: #94a3b8; }
    .badge {
      display: inline-block;
      margin-top: 1rem;
      font-size: .75rem;
      letter-spacing: .05em;
      text-transform: uppercase;
      color: #38bdf8;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Hello, World 👋</h1>
    <p>Import Software deployment is live.</p>
    <span class="badge">Deployed via GitHub Actions</span>
  </main>
</body>
</html>
