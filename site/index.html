<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nisaro</title>
    <meta name="description" content="Nisaro — Import · Supply · Solutions. Próximamente." />
    <link rel="icon" type="image/png" href="./nisaro-logo.png" />
    <style>
      :root {
        --navy: #0e1c33;
        --blue: #1f6fe0;
        --gray: #94a3b8;
        --bg: #f4f6fa;
        --muted: #5b6b82;
      }
      * { box-sizing: border-box; }
      html, body { height: 100%; margin: 0; }
      body {
        font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        background:
          radial-gradient(1000px 500px at 50% -5%, rgba(31, 111, 224, 0.10), transparent 60%),
          var(--bg);
        color: var(--navy);
        display: grid;
        place-items: center;
        min-height: 100svh;
        -webkit-font-smoothing: antialiased;
      }
      main {
        text-align: center;
        padding: 2rem 1.5rem;
        max-width: 620px;
      }
      .logo {
        width: min(440px, 82vw);
        height: auto;
        display: block;
        margin: 0 auto;
      }
      .badge {
        display: inline-block;
        margin-top: 1.5rem;
        font-size: 0.78rem;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        font-weight: 600;
        color: var(--blue);
        border: 1px solid rgba(31, 111, 224, 0.3);
        border-radius: 999px;
        padding: 0.45rem 1rem;
        background: rgba(31, 111, 224, 0.06);
      }
      p.tagline {
        margin: 1.4rem auto 0;
        color: var(--muted);
        font-size: 1.05rem;
        line-height: 1.6;
        max-width: 40ch;
      }
      .actions { margin-top: 2.25rem; }
      a.tool {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        text-decoration: none;
        font-weight: 600;
        font-size: 0.95rem;
        color: #fff;
        background: var(--blue);
        border-radius: 12px;
        padding: 0.85rem 1.5rem;
        box-shadow: 0 8px 20px rgba(31, 111, 224, 0.25);
        transition: transform 0.15s ease, box-shadow 0.15s ease;
      }
      a.tool:hover {
        transform: translateY(-1px);
        box-shadow: 0 10px 26px rgba(31, 111, 224, 0.32);
      }
      footer {
        position: fixed;
        bottom: 1.25rem;
        left: 0;
        right: 0;
        text-align: center;
        color: var(--gray);
        font-size: 0.8rem;
      }
    </style>
  </head>
  <body>
    <main>
      <img class="logo" src="./nisaro-logo.png" alt="Nisaro — Import · Supply · Solutions" />
      <div class="badge">Próximamente · Coming soon</div>
      <p class="tagline">
        Estamos construyendo algo nuevo.
        <br />
        <span style="opacity: 0.75">We're building something new.</span>
      </p>
      <div class="actions">
        <a class="tool" href="https://app.nisaro.tech">
          Acceder a la herramienta
          <span aria-hidden="true">→</span>
        </a>
      </div>
    </main>
    <footer>© <span id="y"></span> Nisaro</footer>
    <script>
      document.getElementById('y').textContent = new Date().getFullYear()
    </script>
  </body>
</html>
